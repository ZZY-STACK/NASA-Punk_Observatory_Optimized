<!-- 水星数据脚本（累计商业发射+无超数BUG+粒子百万换算） -->
<script>
    // 核心配置：累计商业航天发射次数（官方数据）
    const MAX_LAUNCH = 120;
    const segments = [
        { count: 0,    year: "2015" },
        { count: 2,    year: "2018" },
        { count: 7,    year: "2020" },
        { count: 25,   year: "2022" },
        { count: 50,   year: "2023" },
        { count: 83,   year: "2024" },
        { count: 120,  year: "2025" }
    ];

    // 粒子换算：累计数 × 10000 = 120万粒子
    const PARTICLE_RATIO = 10000;
    const SPEED = 100;
    const STEP = 1;
    let currentCount = 0;
    let timer;

    function getCurrentYear(count) {
        for (let i = segments.length - 1; i >= 0; i--) {
            if (count >= segments[i].count) {
                return segments[i].year;
            }
        }
        return "2015";
    }

    function update() {
        if (currentCount >= MAX_LAUNCH) {
            clearInterval(timer);
            return;
        }

        let nextCount = currentCount + STEP;
        if (nextCount > MAX_LAUNCH) nextCount = MAX_LAUNCH;
        currentCount = nextCount;

        const currentYear = getCurrentYear(currentCount);
        const particleNum = currentCount * PARTICLE_RATIO;
        const particleText = particleNum.toLocaleString();

        document.getElementById("year").innerText = currentYear;
        document.getElementById("launch").innerText = currentCount;
        document.getElementById("particle").innerText = particleText;
    }

    //  同步延迟3秒启动
    window.addEventListener('load', () => {
        setTimeout(() => {
            timer = setInterval(update, SPEED);
        }, 3000);
    });
</script>
</body>
