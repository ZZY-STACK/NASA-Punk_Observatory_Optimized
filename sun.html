<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA-Punk : SOL (太阳)</title>
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="stylesheet" href="./styles/transition.css">
    <style>
        .sun-intro-overlay {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 1200;
            width: min(360px, 28vw);
            padding: 1rem 1.1rem;
            border-radius: 16px;
            background: rgba(4, 12, 24, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.22);
            color: #f6fbff;
            font-family: "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            font-size: 0.95rem;
            line-height: 1.7;
            letter-spacing: 0.02em;
            text-align: left;
            overflow-wrap: break-word;
        }

        .sun-intro-text {
            margin: 0;
            white-space: pre-wrap;
        }

        .sun-intro-overlay.fade-out {
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
        }

        .sun-marker {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .o-sun {
            display: none;
        }

        .vertical-zoom-control {
            position: fixed !important;
            bottom: 150px !important;
            right: 40px !important;
            z-index: 9998 !important;
        }

        .dashboard {
            position: fixed;
            bottom: 20px;
            right: 150px;
            z-index: 100;
            width: 380px;
            padding: 20px;
            background: #0d1430;
            border: 2px solid #FF9D00;
            border-radius: 12px;
            text-align: center;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
        }
        .data-col {
            width: 32%;
        }
        .col-label {
            font-size: 14px;
            color: #FFC107;
            margin-bottom: 10px;
        }
        .num-box {
            font-size: 22px;
            font-weight: bold;
            color: #FF9D00;
            min-height: 30px;
        }
    </style>
</head>

<body data-planet="sun">
    <div class="transition-curtain start-covered" id="global-curtain">
        <div class="curtain-col c1"></div>
        <div class="curtain-col c2"></div>
        <div class="curtain-col c3"></div>
        <div class="curtain-col c4"></div>
    </div>

    <div id="sun-intro-overlay" class="sun-intro-overlay">
        <p class="sun-intro-text">以生成太阳粒子做模拟，对应我国长征系列运载火箭历年累计发射次数数据，太阳为太阳系天体发射源，与长征火箭作为航天入轨核心载体场景高度契合<br>数据来源：国家统计局、赛迪智库推算</p>
    </div>

    <div class="brand-stripe">
        <div class="stripe-seg s-1"></div>
        <div class="stripe-seg s-2"></div>
        <div class="stripe-seg s-3"></div>
        <div class="stripe-seg s-4"></div>
    </div>

    <canvas id="topo-canvas"></canvas>
    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="planet-ui-root"></div>
    </div>

    <!-- 数据面板 -->
    <div class="dashboard">
        <div class="data-row">
            <div class="data-col">
                <div class="col-label">当前时间</div>
                <div class="num-box" id="time">1970</div>
            </div>
            <div class="data-col">
                <div class="col-label">累计发射</div>
                <div class="num-box" id="launch">0</div>
            </div>
            <div class="data-col">
                <div class="col-label">太阳粒子数</div>
                <div class="num-box" id="particle">0</div>
            </div>
        </div>
    </div>

    <script src="./scripts/vendor/three.min.js"></script>
    <script src="./scripts/vendor/simplex-noise.min.js"></script>
    <script src="./scripts/components/topoRenderer.js"></script>
    <script src="./scripts/components/observatoryUi.js"></script>
    <script src="./scripts/core/telemetry.js"></script>
    <script src="./scripts/core/interaction.js"></script>
    <script src="./scripts/core/transition.js"></script>
    <script src="./scripts/core/iframeNavigation.js"></script>
    <script src="./scripts/core/audioManager.js"></script>
    <script src="./scripts/planets/config.js"></script>
    <script src="./scripts/components/planetUi.js"></script>
    <script src="./scripts/pages/planet.page.js"></script>
    <script src="./scripts/planets/sun.js"></script>

    <!-- 简化数据脚本：仅控制时间/发射数，粒子数由3D引擎实时同步 -->
    <script>
        const MAX_LAUNCH = 657;
        const segments = [
            { count: 0,   date: "1970" },
            { count: 100, date: "2007.06.01" },
            { count: 200, date: "2014.12.07" },
            { count: 300, date: "2019.03.10" },
            { count: 400, date: "2021.12.10" },
            { count: 500, date: "2023.12.10" },
            { count: 600, date: "2025.10.16" },
            { count: 657, date: "2025.12.31" }
        ];

        const SPEED = 20;
        const STEP = 10;
        let currentCount = 0;
        let timer;
        window.currentCount = 0; // 暴露给3D引擎

        function dateToTimestamp(str) {
            if (str.length === 4) return new Date(`${str}-01-01`).getTime();
            const [y, m, d] = str.split('.');
            return new Date(y, m - 1, d).getTime();
        }

        function getCurrentDate(count) {
            for (let i = 0; i < segments.length - 1; i++) {
                const s = segments[i];
                const e = segments[i + 1];
                if (count >= s.count && count <= e.count) {
                    const rate = (count - s.count)/(e.count - s.count);
                    const sTime = dateToTimestamp(s.date);
                    const eTime = dateToTimestamp(e.date);
                    const curTime = sTime + (eTime - sTime) * rate;
                    const date = new Date(curTime);
                    
                    if (s.date.length === 4) {
                        return date.getFullYear().toString();
                    } else {
                        const y = date.getFullYear();
                        const m = String(date.getMonth()+1).padStart(2, '0');
                        const d = String(date.getDate()).padStart(2, '0');
                        return `${y}.${m}.${d}`;
                    }
                }
            }
            return "2025.12.31";
        }

        function update() {
            if (currentCount >= MAX_LAUNCH) {
                clearInterval(timer);
                return;
            }

            let nextCount = currentCount + STEP;
            if (nextCount > MAX_LAUNCH) nextCount = MAX_LAUNCH;

            currentCount = nextCount;
            window.currentCount = currentCount; // 同步给全局
            const currentDate = getCurrentDate(currentCount);

            // 仅更新时间和发射数，粒子数由sun.js自动更新
            document.getElementById("time").innerText = currentDate;
            document.getElementById("launch").innerText = currentCount;
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                timer = setInterval(update, SPEED);
            }, 3000);
        });
    </script>
</body>

</html>
