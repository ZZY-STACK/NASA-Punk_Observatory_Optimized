<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA-Punk : SOL-V (木星)</title>
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="stylesheet" href="./styles/transition.css">
    <style>
        .jupiter-intro-overlay {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 1200;
            width: min(360px, 28vw);
            padding: 1rem 1.1rem;
            border-radius: 16px;
            background: rgba(4, 12, 24, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.22);
            color: #f6fbff;
            font-family: "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            font-size: 0.95rem;
            line-height: 1.7;
            letter-spacing: 0.02em;
            text-align: left;
            overflow-wrap: break-word;
        }
        .jupiter-intro-text {
            margin: 0;
            white-space: pre-wrap;
        }
        .jupiter-intro-overlay.fade-out {
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
        }
        /* 木星专用配色 */
        .p-jupiter {
            box-shadow: 0 0 10px rgba(214, 168, 109, 0.8);
            background-color: #d6a86d;
        }
        /* 数据面板样式 */
        .dashboard {
            position: fixed;
            bottom: 20px;
            right: 150px;
            z-index: 100;
            width: 420px;
            padding: 20px;
            background: #0d1430;
            border: 2px solid #d6a86d;
            border-radius: 12px;
            text-align: center;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
        }
        .data-col {
            width: 32%;
        }
        .col-label {
            font-size: 14px;
            color: #f0d298;
            margin-bottom: 10px;
        }
        .num-box {
            font-size: 22px;
            font-weight: bold;
            color: #d6a86d;
            min-height: 30px;
        }
    </style>
</head>
<body data-planet="jupiter">
    <div class="transition-curtain start-covered" id="global-curtain">
        <div class="curtain-col c1"></div>
        <div class="curtain-col c2"></div>
        <div class="curtain-col c3"></div>
        <div class="curtain-col c4"></div>
    </div>

    <div id="jupiter-intro-overlay" class="jupiter-intro-overlay">
        <p class="jupiter-intro-text">以生成木星粒子做模拟，对应我国深空探测总飞行里程数据，木星覆盖太阳系广阔范围，与全域深空探测场景高度契合<br>数据来源：国家航天局嫦娥、天问系列任务汇总</p>
    </div>

    <div class="brand-stripe">
        <div class="stripe-seg s-1"></div>
        <div class="stripe-seg s-2"></div>
        <div class="stripe-seg s-3"></div>
        <div class="stripe-seg s-4"></div>
    </div>

    <canvas id="topo-canvas"></canvas>
    <audio id="background-music" src="assets/Inon Zur - Into the Starfield (Main Theme).mp3" autoplay loop>
      Your browser does not support the audio element.
    </audio>
    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="planet-ui-root"></div>
    </div>

    <!--  深空探测里程数据面板 -->
    <div class="dashboard">
        <div class="data-row">
            <div class="data-col">
                <div class="col-label">探测时间</div>
                <div class="num-box" id="jupiter-time">2007.10.24</div>
            </div>
            <div class="data-col">
                <div class="col-label">累计里程(亿公里)</div>
                <div class="num-box" id="jupiter-mileage">0.018</div>
            </div>
            <div class="data-col">
                <div class="col-label">木星粒子数</div>
                <div class="num-box" id="jupiter-particle">0</div>
            </div>
        </div>
    </div>

    <script src="./scripts/vendor/three.min.js"></script>
    <script src="./scripts/vendor/simplex-noise.min.js"></script>
    <script src="./scripts/components/topoRenderer.js"></script>
    <script src="./scripts/components/observatoryUi.js"></script>
    <script src="./scripts/core/telemetry.js"></script>
    <script src="./scripts/core/interaction.js"></script>
    <script src="./scripts/core/transition.js"></script>
<script src="./scripts/core/audioManager.js"></script>
<script src="./scripts/core/audioManager.js"></script>
<script src="./scripts/core/audioManager.js"></script>
    <script src="./scripts/planets/config.js"></script>
    <script src="./scripts/components/planetUi.js"></script>
    <script src="./scripts/pages/planet.page.js"></script>
    <script src="./scripts/planets/jupiter.js"></script>
</body>
</html>
